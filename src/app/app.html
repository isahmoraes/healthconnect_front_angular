<mat-sidenav-container class="app-container">

  <mat-sidenav #drawer mode="over" class="side-nav">
    

    <mat-nav-list>
      <a mat-list-item routerLink="/home" (click)="drawer.close()">Home</a>
      <a mat-list-item routerLink="/appointments" (click)="drawer.close()">Agenda</a>
      <a mat-list-item routerLink="/patients" (click)="drawer.close()">Pacientes</a>
      <a mat-list-item routerLink="/settings" (click)="drawer.close()">Configurações</a>
    </mat-nav-list>
  </mat-sidenav>

  <mat-sidenav-content>

    <div class="container">
      <mat-toolbar class="bar">
        <button mat-icon-button class="menu-button" (click)="drawer.toggle()">
          <mat-icon>menu</mat-icon>
        </button>

        <h2>HealthConnect</h2>
      </mat-toolbar>
    </div>

    <router-outlet></router-outlet>

  </mat-sidenav-content>

</mat-sidenav-container>
