<h2 mat-dialog-title class="title">New Doctors</h2>
<mat-dialog-content class ="mat-form-patient">
 
   <label class="text-name">Name:</label>
    <mat-form-field appearance="outline">
      <input matInput>
    </mat-form-field>
  <label class="text-name">Specialty:</label>
    <mat-form-field appearance="outline">
      <input matInput type="text">
    </mat-form-field>

</mat-dialog-content>   
<mat-dialog-actions>
  <button matButton >No Thanks</button>
  <button matButton cdkFocusInitial>Ok</button>
</mat-dialog-actions>
