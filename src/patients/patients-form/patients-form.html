
<h2 mat-dialog-title class="title">New Patient</h2>
<mat-dialog-content class ="mat-form-patient">
 
   <label class="text-name">Name:</label>
    <mat-form-field appearance="outline">
      <input matInput>
    </mat-form-field>
  <label class="text-name">Age:</label>
    <mat-form-field appearance="outline">
      <input matInput type="number">
    </mat-form-field>

    <label class="text-name">Gender:</label>
    <mat-form-field appearance="outline">
      <input matInput>
    </mat-form-field>
  <label class="text-name">Address:</label>
    <mat-form-field appearance="outline">
      <input matInput>
    </mat-form-field>
   <label class="text-name">Phone:</label>
    <mat-form-field appearance="outline">
      <input matInput>
    </mat-form-field>   
  <label class="text-name">Email:</label>
    <mat-form-field appearance="outline">
      <input matInput type="email">
    </mat-form-field>
    <label class="text-name">CPF:</label>
    <mat-form-field appearance="outline">
      <input matInput>
    </mat-form-field>
</mat-dialog-content>   
<mat-dialog-actions>
  <button matButton >No Thanks</button>
  <button matButton cdkFocusInitial>Ok</button>
</mat-dialog-actions>
